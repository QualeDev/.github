name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Quale? Describe what you'd like and why it's useful.

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What would you like Quale to do?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this useful?
      description: What problem does this solve or what use case does it enable?
    validations:
      required: true

  - type: textarea
    id: syntax
    attributes:
      label: Example syntax (if applicable)
      description: If this involves `.quale` language changes, show what it might look like.
      render: quale

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Language / syntax
        - Engine / runtime
        - GPU / performance
        - CLI
        - Desktop app
        - Documentation
        - Other
    validations:
      required: true
