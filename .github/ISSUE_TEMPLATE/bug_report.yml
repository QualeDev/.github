name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `quale evolve my-file.quale`
        2. Wait for generation 10
        3. See error...
    validations:
      required: true

  - type: textarea
    id: quale-file
    attributes:
      label: Quale file (if relevant)
      description: Paste a minimal `.quale` file that reproduces the issue, or link to one.
      render: quale

  - type: dropdown
    id: device
    attributes:
      label: Compute device
      options:
        - CPU
        - GPU (CUDA)
        - GPU (OpenCL)
        - Not applicable
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11, Ubuntu 24.04, macOS 15"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error messages or console output.
      render: shell
