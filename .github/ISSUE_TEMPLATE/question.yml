name: Question
description: Ask a question about using Quale
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, check the [documentation](https://quale.dev/docs/) - your answer might already be there.

  - type: textarea
    id: question
    attributes:
      label: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to achieve? Include your `.quale` file if relevant.
